
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  #vroot{min-height:100vh;background:linear-gradient(135deg,#fff0f3 0%,#ffe4e8 40%,#ffd6e0 100%);font-family:'Lato',sans-serif;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;}
  #hcanvas{position:fixed;top:0;left:0;pointer-events:none;z-index:0;}
  #ccanvas{position:fixed;top:0;left:0;pointer-events:none;z-index:100;display:none;}

  /* GIFT BOX SCREEN */
  #gift-screen{position:relative;z-index:10;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1.2rem;}
  .gift-hint{font-family:'Playfair Display',serif;font-size:clamp(1.1rem,3vw,1.5rem);color:#c0325b;opacity:0.85;letter-spacing:0.04em;}
  .gift-sub{font-size:0.92rem;color:#d4547c;font-weight:300;letter-spacing:0.08em;animation:float-sub 2s ease-in-out infinite alternate;}
  @keyframes float-sub{from{transform:translateY(0);}to{transform:translateY(-5px);}}
  #gift-box{cursor:pointer;position:relative;width:160px;height:160px;margin:0.5rem auto;animation:float-box 2.5s ease-in-out infinite alternate;transition:transform 0.15s;}
  #gift-box:hover{transform:scale(1.08) rotate(-2deg);}
  #gift-box:active{transform:scale(0.95);}
  @keyframes float-box{from{transform:translateY(0) rotate(-1deg);}to{transform:translateY(-14px) rotate(1deg);}}
  .tap-label{font-size:0.82rem;color:#e05480;letter-spacing:0.12em;text-transform:uppercase;animation:pulse-tap 1.1s ease-in-out infinite alternate;}
  @keyframes pulse-tap{from{opacity:0.5;}to{opacity:1;}}

  /* UNWRAP ANIMATION */
  #unwrap-overlay{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center;background:rgba(255,182,203,0);}
  #unwrap-overlay.active{display:flex;}
  .lid{position:absolute;width:160px;height:52px;background:#e8174a;border-radius:10px 10px 0 0;top:calc(50% - 140px);left:50%;transform:translateX(-50%);z-index:502;transition:transform 1.2s cubic-bezier(.34,1.56,.64,1),opacity 0.8s;}
  .lid.fly{transform:translateX(-50%) translateY(-320px) rotate(-25deg);opacity:0;}
  .lid-ribbon{position:absolute;width:18px;height:100%;background:#fff0;left:50%;transform:translateX(-50%);}
  .lid-ribbon::after{content:'';position:absolute;width:18px;height:100%;background:rgba(255,255,255,0.35);border-radius:3px;left:0;}
  .box-body{position:absolute;width:160px;height:130px;background:#f03060;border-radius:0 0 12px 12px;top:calc(50% - 88px);left:50%;transform:translateX(-50%);z-index:501;}
  .box-ribbon-v{position:absolute;width:18px;height:100%;background:rgba(255,255,255,0.35);border-radius:3px;left:50%;transform:translateX(-50%);}
  .burst-stars{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:503;pointer-events:none;}

  /* MAIN CONTENT */
  #main-content{position:relative;z-index:10;text-align:center;max-width:700px;width:100%;display:none;opacity:0;transition:opacity 0.7s;}
  #main-content.show{display:block;opacity:1;}
  .main-heading{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,7vw,5rem);color:#c0325b;line-height:1.2;margin-bottom:1.2rem;text-shadow:0 2px 12px rgba(192,50,91,0.15);transition:all 0.6s ease;}
  .subtext{font-size:clamp(0.95rem,2.5vw,1.2rem);color:#d4547c;font-weight:300;letter-spacing:0.05em;margin-bottom:2rem;}
  .buttons-wrap{display:flex;gap:1.4rem;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:0.5rem;position:relative;}
  #btn-yes{background:linear-gradient(135deg,#27ae60,#2ecc71);color:#fff;border:none;border-radius:50px;font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;padding:0.85em 2.4em;cursor:pointer;box-shadow:0 4px 20px rgba(39,174,96,0.35);transition:transform 0.18s,box-shadow 0.18s;transform-origin:center;z-index:20;position:relative;}
  #btn-yes:hover{transform:scale(1.07);box-shadow:0 8px 32px rgba(39,174,96,0.45);}
  #btn-no{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;border:none;border-radius:50px;font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;padding:0.8em 2.1em;cursor:pointer;box-shadow:0 4px 20px rgba(231,76,60,0.3);position:relative;z-index:20;transition:transform 0.4s cubic-bezier(.34,1.56,.64,1),opacity 0.3s,left 0.5s ease,top 0.5s ease;white-space:nowrap;}
  #btn-no.hidden-no{opacity:0;pointer-events:none;}
  .couple-img{width:180px;height:220px;border-radius:18px;border:4px solid #fff;box-shadow:0 8px 32px rgba(192,50,91,0.18);background:linear-gradient(135deg,#ffc2d4,#ffb3c6);display:flex;align-items:center;justify-content:center;font-size:3rem;opacity:0;transform:translateY(24px) scale(0.95);transition:opacity 0.7s ease,transform 0.7s ease;flex-shrink:0;}
  .couple-img.visible{opacity:1;transform:translateY(0) scale(1);}
  .img-placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .img-label{font-size:0.65rem;font-family:'Lato';color:#c0325b;letter-spacing:0.04em;text-align:center;padding:0 8px;}
  .images-row{display:flex;gap:14px;justify-content:center;margin-bottom:2.2rem;flex-wrap:wrap;}
  .img-caption{font-size:0.78rem;color:#d4547c;margin-top:0.4rem;font-family:'Lato';letter-spacing:0.04em;}
  .success-msg{font-family:'Playfair Display',serif;font-size:clamp(2.6rem,7vw,5.2rem);color:#c0325b;text-shadow:0 2px 16px rgba(192,50,91,0.18);animation:pop-in 0.6s cubic-bezier(.34,1.56,.64,1) both;}
  @keyframes pop-in{0%{transform:scale(0.5);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .heart-divider{font-size:1.6rem;letter-spacing:0.4em;margin:0.5rem 0 1.4rem;color:#e05480;animation:pulse-hearts 1.2s ease-in-out infinite alternate;}
  @keyframes pulse-hearts{from{transform:scale(1);}to{transform:scale(1.15);}}
  .gallery-label{font-size:1.05rem;color:#d4547c;font-family:'Lato';font-weight:300;margin-bottom:1rem;letter-spacing:0.07em;}

  /* MUSIC CONTROLS */
  #music-toggle{position:fixed;bottom:30px;right:30px;z-index:300;background:linear-gradient(135deg,#e91e63,#c2185b);border:none;color:#fff;width:60px;height:60px;border-radius:50%;cursor:pointer;font-size:1.8rem;box-shadow:0 4px 20px rgba(233,30,99,0.4);transition:all 0.3s ease;display:none;}
  #music-toggle.show{display:flex;align-items:center;justify-content:center;}
  #music-toggle:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(233,30,99,0.6);}
  #music-toggle:active{transform:scale(0.95);}
  #music-toggle.playing{animation:pulse-music 1.5s ease-in-out infinite;}
  @keyframes pulse-music{0%, 100%{box-shadow:0 4px 20px rgba(233,30,99,0.4);}50%{box-shadow:0 4px 30px rgba(233,30,99,0.7);}}
  .gif-section-title{font-size:1rem;color:#d4547c;font-family:'Lato';font-weight:400;margin-top:1.8rem;letter-spacing:0.1em;}
  .gif-gallery{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:1rem;}
  .gif-card{width:150px;background:#fff;border-radius:18px;overflow:hidden;border:3px solid #fff;box-shadow:0 12px 24px rgba(192,50,91,0.14);transition:transform 0.25s ease;}
  .gif-card:hover{transform:translateY(-6px);}
  .gif-card img{width:100%;height:150px;object-fit:cover;display:block;}
  .gif-card span{display:block;padding:0.85rem 0.7rem;font-size:0.85rem;color:#c0325b;font-family:'Lato',sans-serif;text-align:center;}
  .gif-box{width:260px;height:260px;margin:0 auto 1.5rem;border-radius:26px;overflow:hidden;background:#fff;border:4px solid rgba(255,255,255,0.95);box-shadow:0 20px 45px rgba(192,50,91,0.16);display:flex;align-items:center;justify-content:center;}
  .gif-box img{width:100%;height:100%;object-fit:cover;}

</style>

<div id="vroot">
  <canvas id="hcanvas"></canvas>
  <canvas id="ccanvas"></canvas>

  <!-- GIFT BOX ENTRY -->
  <div id="gift-screen">
    <p class="gift-hint">A little something for you... 🎁</p>
    <div id="gift-box" onclick="openGift()">
      <svg viewBox="0 0 160 160" width="160" height="160" xmlns="http://www.w3.org/2000/svg">
        <!-- box body -->
        <rect x="10" y="72" width="140" height="80" rx="8" fill="#f03060"/>
        <rect x="10" y="72" width="140" height="80" rx="8" fill="none" stroke="#c0204a" stroke-width="1.5"/>
        <!-- box lid -->
        <rect x="4" y="48" width="152" height="30" rx="8" fill="#e8174a"/>
        <rect x="4" y="48" width="152" height="30" rx="8" fill="none" stroke="#b01038" stroke-width="1.5"/>
        <!-- vertical ribbon on lid -->
        <rect x="73" y="48" width="14" height="30" rx="3" fill="rgba(255,255,255,0.35)"/>
        <!-- vertical ribbon on body -->
        <rect x="73" y="72" width="14" height="80" rx="3" fill="rgba(255,255,255,0.35)"/>
        <!-- horizontal ribbon on body -->
        <rect x="10" y="106" width="140" height="12" rx="3" fill="rgba(255,255,255,0.3)"/>
        <!-- bow left loop -->
        <ellipse cx="62" cy="38" rx="22" ry="14" fill="#ff4d79" transform="rotate(-20 62 38)"/>
        <ellipse cx="62" cy="38" rx="14" ry="8" fill="#f03060" transform="rotate(-20 62 38)"/>
        <!-- bow right loop -->
        <ellipse cx="98" cy="38" rx="22" ry="14" fill="#ff4d79" transform="rotate(20 98 38)"/>
        <ellipse cx="98" cy="38" rx="14" ry="8" fill="#f03060" transform="rotate(20 98 38)"/>
        <!-- bow center -->
        <circle cx="80" cy="44" r="11" fill="#e8174a"/>
        <circle cx="80" cy="44" r="7" fill="#ff6090"/>
        <!-- ribbon top left -->
        <line x1="80" y1="44" x2="56" y2="72" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>
        <!-- ribbon top right -->
        <line x1="80" y1="44" x2="104" y2="72" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>
        <!-- sparkles -->
        <text x="22" y="40" font-size="14" fill="#ffb3c6">✦</text>
        <text x="128" y="58" font-size="11" fill="#ffb3c6">✦</text>
        <text x="136" y="38" font-size="9" fill="#ff80ab">✦</text>
      </svg>
    </div>
    <p class="tap-label">✦ tap to open ✦</p>
    <p class="gift-sub">made with love, just for you</p>
  </div>

  <!-- UNWRAP OVERLAY -->
  <div id="unwrap-overlay">
    <div class="lid" id="box-lid">
      <div class="lid-ribbon"></div>
    </div>
    <div class="box-body">
      <div class="box-ribbon-v"></div>
    </div>
    <svg class="burst-stars" id="burst" width="300" height="300" viewBox="0 0 300 300" style="opacity:0;transition:opacity 0.3s;">
      <g id="burst-g"></g>
    </svg>
  </div>

  <!-- MAIN VALENTINE CONTENT -->
  <div id="main-content">
    <div class="gif-box" id="top-gif-box">
      <img src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExMm14dGNzZjR3dWlncGE0Z2c5NWRvMDVtNjk0eThjNnpjamt3NXplYyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/t8xgPfC5oNIRMrNooe/giphy.gif" alt="Love GIF" data-default-src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExMm14dGNzZjR3dWlncGE0Z2c5NWRvMDVtNjk0eThjNnpjamt3NXplYyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/t8xgPfC5oNIRMrNooe/giphy.gif" data-no-src="https://media0.giphy.com/media/o6jQQJaIbMWsPCyLYz/giphy.gif">
    </div>
    <h1 class="main-heading" id="main-heading">Do you love me?</h1>
    <p class="subtext" id="subtext">Be honest now... your heart already knows 💕</p>
    <div class="buttons-wrap" id="buttons-section">
      <button id="btn-yes" onclick="handleYes()">Yes ❤️</button>
      <button id="btn-no" onmouseenter="escapeNo()" onclick="escapeNo()">No 😅</button>
    </div>
  </div>
</div>

<!-- AUDIO ELEMENT -->
<audio id="bg-music" preload="auto" autoplay playsinline>
  <source src="trimmed_audio.webm" type="audio/webm">
</audio>

<!-- MUSIC CONTROL BUTTON -->
<button id="music-toggle" onclick="toggleMusic()">🎵</button>

<script>
(function(){
  /* --- floating hearts bg --- */
  const hc=document.getElementById('hcanvas'), hx=hc.getContext('2d');
  let parts=[];
  function rsz(){hc.width=window.innerWidth;hc.height=window.innerHeight;}
  rsz(); window.addEventListener('resize',rsz);
  function hpath(x,y,s,c){c.save();c.translate(x,y);c.scale(s/10,s/10);c.beginPath();c.moveTo(0,-3);c.bezierCurveTo(0,-6,-5,-7,-5,-3.5);c.bezierCurveTo(-5,-0.5,-2,2,0,5);c.bezierCurveTo(2,2,5,-0.5,5,-3.5);c.bezierCurveTo(5,-7,0,-6,0,-3);c.closePath();c.restore();}
  function mkp(){return{x:Math.random()*window.innerWidth,y:window.innerHeight+30,size:8+Math.random()*18,speed:0.4+Math.random()*0.8,drift:(Math.random()-0.5)*0.4,opacity:0.08+Math.random()*0.18,wobble:Math.random()*Math.PI*2,wobbleSpeed:0.01+Math.random()*0.02};}
  for(let i=0;i<28;i++){let p=mkp();p.y=Math.random()*window.innerHeight;parts.push(p);}
  function animH(){hx.clearRect(0,0,hc.width,hc.height);parts.forEach((p,i)=>{p.y-=p.speed;p.wobble+=p.wobbleSpeed;p.x+=Math.sin(p.wobble)*p.drift;if(p.y<-40)parts[i]=mkp();hx.globalAlpha=p.opacity;hx.fillStyle=['#ff6b9d','#ff4081','#e91e63','#f48fb1','#ff80ab'][Math.floor(Math.random()*5)];hpath(p.x,p.y,p.size,hx);hx.fill();});hx.globalAlpha=1;requestAnimationFrame(animH);}
  animH();

  /* --- confetti --- */
  const cc=document.getElementById('ccanvas'), cx=cc.getContext('2d');
  let cparts=[],crun=false;
  function launchConf(){cc.width=window.innerWidth;cc.height=window.innerHeight;cc.style.display='block';crun=true;cparts=[];for(let i=0;i<120;i++)cparts.push({x:Math.random()*window.innerWidth,y:-20-Math.random()*200,vx:(Math.random()-0.5)*4,vy:1.5+Math.random()*4,size:7+Math.random()*10,rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.15,color:['#ff4081','#e91e63','#ff80ab','#f48fb1','#ffb3d1','#c0325b'][Math.floor(Math.random()*6)],alpha:1});animC();}
  function animC(){if(!crun)return;cx.clearRect(0,0,cc.width,cc.height);let alive=false;cparts.forEach(p=>{p.y+=p.vy;p.x+=p.vx;p.rot+=p.rotSpeed;p.vy+=0.04;if(p.y<cc.height+40)alive=true;if(p.y>cc.height-80)p.alpha=Math.max(0,p.alpha-0.018);cx.globalAlpha=p.alpha;cx.fillStyle=p.color;cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);hpath(0,0,p.size,cx);cx.fill();cx.restore();});cx.globalAlpha=1;if(alive)requestAnimationFrame(animC);else{cc.style.display='none';crun=false;}}

  /* --- gift open --- */
  window.openGift = function(){
    const gs=document.getElementById('gift-screen');
    const ov=document.getElementById('unwrap-overlay');
    const lid=document.getElementById('box-lid');
    const burst=document.getElementById('burst');
    const bg=document.getElementById('vroot');

    gs.style.transition='opacity 0.4s';
    gs.style.opacity='0';
    setTimeout(()=>{
      gs.style.display='none';
      ov.classList.add('active');
      bg.style.background='linear-gradient(135deg,#fff0f3 0%,#ffe4e8 40%,#ffd6e0 100%)';

      // flash background
      bg.style.transition='background 0.3s';
      setTimeout(()=>{bg.style.background='linear-gradient(135deg,#ffe0ea 0%,#ffc8d8 40%,#ffb3c8 100%)';},200);

      // fly lid off
      setTimeout(()=>{
        lid.classList.add('fly');
      },300);

      // burst stars
      setTimeout(()=>{
        burst.style.opacity='1';
        const g=document.getElementById('burst-g');
        const colors=['#ff4081','#e91e63','#ff80ab','#ffb3d1','#c0325b','#fff'];
        for(let i=0;i<18;i++){
          const angle=(i/18)*Math.PI*2;
          const r=90+Math.random()*40;
          const x=150+Math.cos(angle)*r;
          const y=150+Math.sin(angle)*r;
          const sz=8+Math.random()*14;
          const el=document.createElementNS('http://www.w3.org/2000/svg','text');
          el.setAttribute('x',x);el.setAttribute('y',y);
          el.setAttribute('font-size',sz);el.setAttribute('fill',colors[i%colors.length]);
          el.setAttribute('text-anchor','middle');
          el.textContent='♥';
          el.style.animation=`pop-in 0.5s ${i*0.04}s cubic-bezier(.34,1.56,.64,1) both`;
          g.appendChild(el);
        }
      },600);

      // flash & reveal
      setTimeout(()=>{
        ov.style.transition='background 0.5s';
        ov.style.background='rgba(255,182,203,0.85)';
        setTimeout(()=>{
          ov.style.background='rgba(255,182,203,0)';
          setTimeout(()=>{
            ov.classList.remove('active');
            ov.style.display='none';
            const mc=document.getElementById('main-content');
            mc.style.display='block';
            setTimeout(()=>mc.style.opacity='1',30);
            launchConf();
          },500);
        },400);
      },1100);

    },400);
  };

  /* --- no button --- */
  let yScale=1, nCount=0;
  window.escapeNo=function(){
    showNoGif();
    nCount++;
    const btn=document.getElementById('btn-no');
    const rect=btn.getBoundingClientRect();
    if(btn.style.position !== 'fixed'){
      btn.style.position = 'fixed';
      btn.style.left=rect.left+'px';
      btn.style.top=rect.top+'px';
      btn.style.zIndex = '300';
      setTimeout(() => {
        const bw=btn.offsetWidth||110,bh=btn.offsetHeight||52,mg=20;
        btn.style.left=(mg+Math.random()*(window.innerWidth-bw-mg*2))+'px';
        btn.style.top=(mg+Math.random()*(window.innerHeight-bh-mg*2))+'px';
      }, 10);
    } else {
      const bw=btn.offsetWidth||110,bh=btn.offsetHeight||52,mg=20;
      btn.style.left=(mg+Math.random()*(window.innerWidth-bw-mg*2))+'px';
      btn.style.top=(mg+Math.random()*(window.innerHeight-bh-mg*2))+'px';
    }
    yScale=Math.min(yScale+0.18,3.2);
    const yb=document.getElementById('btn-yes');
    yb.style.transform=`scale(${yScale})`;
    yb.style.boxShadow=`0 ${4+nCount*2}px ${20+nCount*4}px rgba(39,174,96,${Math.min(0.35+nCount*0.03,0.75)})`;
  };
  let noGifTimer=null;
  function showNoGif(){
    const img=document.querySelector('#top-gif-box img');
    if(!img) return;
    const defaultSrc=img.dataset.defaultSrc || img.src;
    const noSrc=img.dataset.noSrc;
    if(!noSrc) return;
    img.src=noSrc;
    clearTimeout(noGifTimer);
    noGifTimer=setTimeout(()=>{
      img.src=defaultSrc;
    },3000);
  }


  /* --- music controls --- */
  let isPlaying=false;
  window.toggleMusic=function(){
    const audio=document.getElementById('bg-music');
    const btn=document.getElementById('music-toggle');
    if(isPlaying){audio.pause();btn.classList.remove('playing');btn.textContent='🎵';isPlaying=false;}else{audio.play();btn.classList.add('playing');btn.textContent='⏸';isPlaying=true;}
  };
  window.playMusic=function(){
    const audio=document.getElementById('bg-music');
    const btn=document.getElementById('music-toggle');
    if(!audio||!btn) return;
    audio.play().then(()=>{
      btn.classList.add('show','playing');
      btn.textContent='⏸';
      isPlaying=true;
    }).catch(()=>{
      btn.classList.add('show');
      btn.textContent='🎵';
      isPlaying=false;
    });
  };
  function startMusicOnLoad(){
    playMusic();
    window.addEventListener('click', function tryPlay(){
      playMusic();
      window.removeEventListener('click', tryPlay);
    });
    window.addEventListener('touchstart', function tryPlayTouch(){
      playMusic();
      window.removeEventListener('touchstart', tryPlayTouch);
    });
  }
  window.addEventListener('load', function(){
    startMusicOnLoad();
    setTimeout(startMusicOnLoad, 250);
  });

  /* --- yes button --- */
  window.handleYes=function(){
    playMusic();
    document.getElementById('btn-no').classList.add('hidden-no');
    launchConf(); setTimeout(launchConf,700);
    const mc=document.getElementById('main-content');
    const topGif=document.getElementById('top-gif-box');
    if(topGif){
      topGif.remove();
    }
    mc.querySelectorAll('.gif-box').forEach(el=>el.remove());
    mc.style.transition='none';
    mc.style.opacity='0';
    mc.style.display='block';
    mc.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;">
      <div class="success-msg">I LOVE YOU! ❤️</div>
      <div class="heart-divider">♥ ♥ ♥</div>
      <div class="gif-box yes-gif-box">
        <img src="tom.gif.gif" alt="Love GIF">
      </div>
      <p class="gallery-label">Every moment with you is magic</p>
    </div>`;
    requestAnimationFrame(()=>{
      mc.style.transition='opacity 0.25s ease';
      mc.style.opacity='1';
    });
  };
})();
</script>
